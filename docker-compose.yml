services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: puaas-app
    restart: unless-stopped
    environment:
      - AUTORRUN_ENABLED=true
      - AUTORUN_LARAVEL_MIGRATION_SEEDER=true
    ports:
      - "9006:8080"
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql_puaas
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`puaas.sticknologic.is-a.dev`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls.certresolver=letsencrypt

  mysql_puaas:
    image: mysql:latest
    container_name: puaas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: laravel-puaas
      MYSQL_USER: user-puaas
      MYSQL_PASSWORD: rootpassword
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dbdata: